server {
    listen 80;
    server_name your-domain.com;

    root /var/www/your-site/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /photos/ {
        alias /var/www/your-site/photos/;

        location ~* \.(jpg|jpeg|png|webp|avif)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location ~* . { deny all; }
    }

    location = /photos.json {
        alias /var/www/your-site/photos.json;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
